[Appearance]
color_scheme_path=/home/wiz/.config/qt5ct/colors/Catppuccin-Mocha.conf
custom_palette=false
icon_theme=Papirus-Dark
standard_dialogs=xdgdesktopportal
style=kvantum

[Fonts]
