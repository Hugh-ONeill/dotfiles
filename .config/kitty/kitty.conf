# vim:ft=kitty

# ══════════════════════════════════════════════════════════════════════════════
# Theme
# ══════════════════════════════════════════════════════════════════════════════

include current-theme.conf

# ══════════════════════════════════════════════════════════════════════════════
# Fonts
# ══════════════════════════════════════════════════════════════════════════════

font_family      family="FiraCode Nerd Font Mono"
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        11.0

# ══════════════════════════════════════════════════════════════════════════════
# Cursor
# ══════════════════════════════════════════════════════════════════════════════

cursor_shape               beam
cursor_beam_thickness      1.5
cursor_blink_interval      0
cursor_stop_blinking_after 0

# ══════════════════════════════════════════════════════════════════════════════
# Scrollback
# ══════════════════════════════════════════════════════════════════════════════

scrollback_lines           50000
scrollback_pager           less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER
scrollback_pager_history_size 10

# ══════════════════════════════════════════════════════════════════════════════
# Mouse
# ══════════════════════════════════════════════════════════════════════════════

url_style                  curly
open_url_with              default
detect_urls                yes
show_hyperlink_targets     yes
copy_on_select             clipboard
strip_trailing_spaces      smart

# ══════════════════════════════════════════════════════════════════════════════
# Performance
# ══════════════════════════════════════════════════════════════════════════════

repaint_delay              6
input_delay                1
sync_to_monitor            yes

# ══════════════════════════════════════════════════════════════════════════════
# Bell
# ══════════════════════════════════════════════════════════════════════════════

enable_audio_bell          no
visual_bell_duration       0.0
window_alert_on_bell       no

# ══════════════════════════════════════════════════════════════════════════════
# Window
# ══════════════════════════════════════════════════════════════════════════════

window_padding_width       4 8
placement_strategy         center
hide_window_decorations    no
confirm_os_window_close    -1

# ══════════════════════════════════════════════════════════════════════════════
# Tab Bar
# ══════════════════════════════════════════════════════════════════════════════

tab_bar_edge               bottom
tab_bar_style              powerline
tab_powerline_style        slanted
tab_title_template         "{fmt.fg.red}{bell_symbol}{activity_symbol}{fmt.fg.tab}{index}: {title}"
active_tab_title_template  "{fmt.fg.red}{bell_symbol}{activity_symbol}{fmt.fg.tab}{title}"

# ══════════════════════════════════════════════════════════════════════════════
# Advanced
# ══════════════════════════════════════════════════════════════════════════════

shell_integration          enabled
allow_remote_control       socket-only
listen_on                  unix:/tmp/kitty
editor                     nvim

# ══════════════════════════════════════════════════════════════════════════════
# Keybinds - General
# ══════════════════════════════════════════════════════════════════════════════

map shift+enter            send_text all \e\r
map ctrl+shift+c           copy_to_clipboard
map ctrl+shift+v           paste_from_clipboard
map ctrl+shift+u           kitten unicode_input

# ══════════════════════════════════════════════════════════════════════════════
# Keybinds - Font Size
# ══════════════════════════════════════════════════════════════════════════════

map ctrl+equal             change_font_size all +1.0
map ctrl+minus             change_font_size all -1.0
map ctrl+0                 change_font_size all 0

# ══════════════════════════════════════════════════════════════════════════════
# Keybinds - Scrollback
# ══════════════════════════════════════════════════════════════════════════════

map ctrl+shift+k           scroll_line_up
map ctrl+shift+j           scroll_line_down
map ctrl+shift+page_up     scroll_page_up
map ctrl+shift+page_down   scroll_page_down
map ctrl+shift+home        scroll_home
map ctrl+shift+end         scroll_end
map ctrl+shift+h           show_scrollback
map ctrl+shift+g           show_last_command_output

# ══════════════════════════════════════════════════════════════════════════════
# Keybinds - Tabs
# ══════════════════════════════════════════════════════════════════════════════

map ctrl+shift+t           new_tab_with_cwd
map ctrl+shift+w           close_tab
map ctrl+shift+.           move_tab_forward
map ctrl+shift+,           move_tab_backward
map ctrl+shift+alt+t       set_tab_title

map ctrl+1                 goto_tab 1
map ctrl+2                 goto_tab 2
map ctrl+3                 goto_tab 3
map ctrl+4                 goto_tab 4
map ctrl+5                 goto_tab 5
map ctrl+shift+right       next_tab
map ctrl+shift+left        previous_tab

# ══════════════════════════════════════════════════════════════════════════════
# Keybinds - Windows (Splits)
# ══════════════════════════════════════════════════════════════════════════════

map ctrl+shift+enter       new_window_with_cwd
map ctrl+shift+n           new_os_window_with_cwd
map ctrl+shift+q           close_window
map ctrl+shift+]           next_window
map ctrl+shift+[           previous_window
map ctrl+shift+f           move_window_forward
map ctrl+shift+b           move_window_backward
map ctrl+shift+l           next_layout
map ctrl+shift+r           start_resizing_window

# ══════════════════════════════════════════════════════════════════════════════
# Keybinds - Hints (URL/Path opening)
# ══════════════════════════════════════════════════════════════════════════════

map ctrl+shift+e           open_url_with_hints
map ctrl+shift+p>f         kitten hints --type path --program -
map ctrl+shift+p>shift+f   kitten hints --type path
map ctrl+shift+p>l         kitten hints --type line --program -
map ctrl+shift+p>w         kitten hints --type word --program -
map ctrl+shift+p>h         kitten hints --type hash --program -

# ══════════════════════════════════════════════════════════════════════════════
# Keybinds - Misc
# ══════════════════════════════════════════════════════════════════════════════

map ctrl+shift+f5          load_config_file
map ctrl+shift+f6          debug_config
map ctrl+shift+escape      kitty_shell window
