# Spotify music dashboard
# Layout: spotify_player (top) / lyrics (bottom left) | cava (bottom right)

new_tab music
layout splits
title music

# top: spotify_player
launch --title spotify --cwd current spotify_player

# bottom left: lyrics
launch --title lyrics --location hsplit --cwd current lyrics

# bottom right: cava
launch --title cava --location vsplit --cwd current cava
