# credit: https://github.com/end-4/dots-hyprland

animations {
    # Curves
    bezier = linear, 0, 0, 1, 1
    bezier = md3_standard, 0.2, 0, 0, 1
    bezier = md3_decel, 0.05, 0.7, 0.1, 1
    bezier = md3_accel, 0.3, 0, 0.8, 0.15
    bezier = overshot, 0.05, 0.9, 0.1, 1.1
    bezier = crazyshot, 0.1, 1.5, 0.76, 0.92
    bezier = hyprnostretch, 0.05, 0.9, 0.1, 1.0
    bezier = menu_decel, 0.1, 1, 0, 1
    bezier = menu_accel, 0.38, 0.04, 1, 0.07
    bezier = easeInOutCirc, 0.85, 0, 0.15, 1
    bezier = easeOutCirc, 0, 0.55, 0.45, 1
    bezier = easeOutExpo, 0.16, 1, 0.3, 1
    bezier = softAcDecel, 0.26, 0.26, 0.15, 1
    bezier = md2, 0.4, 0, 0.2, 1

    # Animations
    animation = windows, 1, 4, overshot, popin 80%
    animation = windowsIn, 1, 4, overshot, popin 80%
    animation = windowsOut, 1, 5, md3_accel, slidevert
    animation = windowsMove, 1, 5, easeOutCirc, slide
    animation = border, 1, 8, easeOutCirc
    animation = fade, 1, 4, easeOutExpo
    animation = layers, 1, 4, overshot, popin 80%
    animation = layersIn, 1, 4, overshot, popin 80%
    animation = layersOut, 1, 2, md3_accel, popin 80%
    animation = fadeLayersIn, 1, 3, easeOutExpo
    animation = fadeLayersOut, 1, 3, easeOutCirc
    animation = workspaces, 1, 5, overshot, slide
    animation = specialWorkspace, 1, 4, overshot, slidevert
}
