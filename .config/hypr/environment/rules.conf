##############################
### WINDOWS AND WORKSPACES ###
##############################

# ══════════════════════════════════════════════════════════════════════════════
# Global Rules
# ══════════════════════════════════════════════════════════════════════════════

# Suppress maximize events for all windows
windowrule = match:class .*, suppress_event maximize

# ══════════════════════════════════════════════════════════════════════════════
# Floating Windows
# ══════════════════════════════════════════════════════════════════════════════

# Clipse clipboard manager
windowrule = match:class ^(clipse)$, float on
windowrule = match:class ^(clipse)$, size 622 652
windowrule = match:class ^(clipse)$, center on

# File dialogs
windowrule = match:title ^(Open File).*, float on
windowrule = match:title ^(Save As).*, float on
windowrule = match:title ^(Select a File).*, float on
windowrule = match:title ^(Choose Files).*, float on
windowrule = match:title ^(Confirm to replace files).*, float on
windowrule = match:title ^(Open File).*, size 800 600
windowrule = match:title ^(Save As).*, size 800 600

# System dialogs
windowrule = match:class ^(polkit-.*), float on
windowrule = match:class ^(pavucontrol)$, float on
windowrule = match:class ^(pwvucontrol)$, float on
windowrule = match:class ^(hyprpwcenter)$, float on
windowrule = match:class ^(nm-connection-editor)$, float on
windowrule = match:class ^(blueman-manager)$, float on
windowrule = match:class ^(file-roller)$, float on

# Image/media viewers
windowrule = match:class ^(imv)$, float on
windowrule = match:class ^(mpv)$, float on
windowrule = match:class ^(qView)$, float on

# Hydrus media viewer
windowrule = match:title ^hydrus client media viewer.*, float on
windowrule = match:title ^hydrus client media viewer.*, opaque on
windowrule = match:title ^hydrus client media viewer.*, no_blur on

# ══════════════════════════════════════════════════════════════════════════════
# Application-Specific Rules
# ══════════════════════════════════════════════════════════════════════════════

# Firefox - disable blur for performance
windowrule = match:class ^(firefox)$, no_blur on
windowrule = match:class ^(firefox)$, opaque on

# Spotify
windowrule = match:class ^(Spotify)$, opaque on

# Steam dialogs
windowrule = match:class ^(steam)$ match:title ^(Friends List)$, float on
windowrule = match:class ^(steam)$ match:title ^(Steam Settings)$, float on

# Games - fullscreen, no blur, tearing allowed
windowrule = match:class ^(steam_app_.*), fullscreen on
windowrule = match:class ^(steam_app_.*), opaque on
windowrule = match:class ^(steam_app_.*), no_blur on
windowrule = match:class ^(steam_app_.*), immediate on
windowrule = match:class ^(steam_app_.*), confine_pointer on

# ══════════════════════════════════════════════════════════════════════════════
# Layer Rules
# ══════════════════════════════════════════════════════════════════════════════

layerrule = animation popin, match:namespace rofi

layerrule = blur on, match:namespace hyprlauncher
layerrule = xray on, match:namespace hyprlauncher
layerrule = animation popin, match:namespace hyprlauncher

layerrule = blur on, match:namespace waybar
layerrule = xray on, match:namespace waybar

layerrule = blur on, match:namespace notifications

# ══════════════════════════════════════════════════════════════════════════════
# Workspace Assignments
# ══════════════════════════════════════════════════════════════════════════════

# >>WORKSPACE_ASSIGNMENTS<<
# Single monitor: all workspaces on primary
workspace = 1, monitor:DP-4, persistent:true
workspace = 2, monitor:DP-4, persistent:true
workspace = 3, monitor:DP-4, persistent:true
workspace = 4, monitor:DP-4, persistent:true
workspace = 5, monitor:DP-4, persistent:true
workspace = 6, monitor:DP-4
workspace = 7, monitor:DP-4
workspace = 8, monitor:DP-4
workspace = 9, monitor:DP-4
workspace = 10, monitor:DP-4
# <<WORKSPACE_ASSIGNMENTS>>
