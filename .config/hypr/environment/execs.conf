#################
### AUTOSTART ###
#################

# Portal and environment setup
exec-once = ~/.config/hypr/scripts/xdg-desktop-portal-reset.sh
exec-once = dbus-update-activation-environment --systemd --all
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# Services
exec-once = systemctl --user start hyprpolkitagent
exec-once = systemctl --user restart dunst
exec-once = hypridle
exec-once = hyprpm reload

# UI
# theme must apply before waybar launches: the waybar handler does pkill+relaunch
# if it finds a running instance, which races a concurrent `exec-once = waybar`.
exec-once = ~/.local/bin/theme set catppuccin; waybar
exec-once = ~/.config/hypr/scripts/handle-monitors.sh --listen
exec-once = hyprpaper
exec-once = ~/.config/hypr/scripts/set-cursor.sh

# Utilities
exec-once = clipse -listen
exec-once = udiskie
