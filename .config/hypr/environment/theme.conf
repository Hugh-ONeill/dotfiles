# Toolkit Theme
# GTK_THEME deliberately not set here — gsettings gtk-theme handles it dynamically
# (apply_gtk in lib/apps/desktop.sh updates gsettings on theme switch). A hardcoded
# env var would override gsettings and pin every GTK app to one theme.
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_STYLE_OVERRIDE,kvantum
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1

# Cursor - sourced from theme colors.conf
# env vars set in execs.conf after colors are loaded

##############
### COLORS ###
##############

source = ~/.config/hypr/appearance/colors.conf

##################
### APPEARANCE ###
##################

general {
  border_size = $theme_border_size
  gaps_in = $theme_gaps_in
  gaps_out = $theme_gaps_out
  gaps_workspaces = 0
  col.active_border = $theme_active_border
  col.inactive_border = $theme_inactive_border
}

decoration {
  rounding = $theme_rounding
  screen_shader = $theme_screen_shader

  active_opacity = $theme_active_opacity
  inactive_opacity = $theme_inactive_opacity
  fullscreen_opacity = 1.0

  dim_inactive = $theme_dim_inactive
  dim_strength = $theme_dim_strength
  dim_special = 0.3
  dim_around = 0.4

  blur {
    enabled = $theme_blur_enabled
    size = $theme_blur_size
    passes = $theme_blur_passes
    ignore_opacity = false
    xray = false
    noise = 0.0
    contrast = 1.0
    brightness = 0.95
    vibrancy = 0.15
    vibrancy_darkness = 0.0
    popups = true
    popups_ignorealpha = 0.6
    special = true
  }

  shadow {
    enabled = $theme_shadow_enabled
    range = 20
    render_power = 3
    sharp = false
    ignore_window = true
    color = rgba($crustAlphaee)
    color_inactive = rgba($crustAlpha99)
    offset = 0 5
    scale = 1.0
  }
}

misc {
  background_color = rgba($baseAlphaFF)
}

plugin {
  borders-plus-plus {
    add_borders = $theme_add_borders
    border_size_1 = $theme_bpp_border_size_1
    border_size_2 = $theme_bpp_border_size_2
    natural_rounding = yes
    border_ignore_opacity = false
    col.border_1 = rgba($bpp1AlphaFF)
    col.border_2 = rgba($accentAlphaFF)
  }
}

##################
### ANIMATIONS ###
##################

animations {
  enabled = true
}

source = ~/.config/hypr/appearance/animations.conf
