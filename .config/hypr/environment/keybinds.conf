################
### PROGRAMS ###
################

$TERMINAL = kitty
$BROWSER = firefox

# Launchers
$LAUNCHER = ~/.config/rofi/launcher/launcher.sh
$POWERMENU = ~/.config/rofi/powermenu/powermenu.sh
$SCREENSHOT = ~/.config/rofi/screenshot/screenshot.sh
$NERDFONTS = ~/.config/rofi/nerdfonts/nerdfonts.sh
$CALENDAR = ~/.config/rofi/calendar/calendar.sh
$BLUETOOTH = ~/.config/rofi/bluetooth/bluetooth.sh
$NOTES = ~/.config/rofi/notes/notes.sh
$TODO = ~/.config/rofi/todo/todo.sh
$NETWORK = ~/.config/rofi/network/network.sh
$WALLPAPER = ~/.config/rofi/wallpaper/wallpaper.sh
$THEMEPICKER = ~/.local/bin/theme rofi
$KEYBINDS = ~/.config/rofi/keybinds/keybinds.sh

###################
### KEYBINDINGS ###
###################

binds {
  pass_mouse_when_bound = false
  scroll_event_delay = 300
  workspace_back_and_forth = true
  allow_workspace_cycles = true
  workspace_center_on = 0
  focus_preferred_method = 0
  ignore_group_lock = false
  movefocus_cycles_fullscreen = true
  movefocus_cycles_groupfirst = false
  disable_keybind_grabbing = false
  window_direction_monitor_fallback = true
  allow_pin_fullscreen = false
}

# ══════════════════════════════════════════════════════════════════════════════
# Launch Applications
# ══════════════════════════════════════════════════════════════════════════════

bind = SUPER, Q, exec, $TERMINAL
bind = SUPER, E, exec, $BROWSER
bind = SUPER, D, exec, dolphin
bind = SUPER, A, exec, pkill -x rofi || $LAUNCHER

# ══════════════════════════════════════════════════════════════════════════════
# Menus & Utilities
# ══════════════════════════════════════════════════════════════════════════════

bind = SUPER, X, exec, pkill -x rofi || $POWERMENU
bind = SUPER, V, exec, kitty --class clipse -e clipse
bind = SUPER, period, exec, pkill -x rofi || $NERDFONTS
bind = SUPER, Print, exec, pkill -x rofi || $SCREENSHOT

bind = SUPER, R, exec, pkill -x rofi || $THEMEPICKER
bind = SUPER, W, exec, pkill -x rofi || $WALLPAPER
bind = SUPER, N, exec, pkill -x rofi || $NOTES
bind = SUPER, C, exec, pkill -x rofi || $CALENDAR
bind = SUPER, B, exec, pkill -x rofi || $BLUETOOTH
bind = SUPER, backslash, exec, pkill -x rofi || $NETWORK
bind = SUPER, slash, exec, pkill -x rofi || $TODO

# ══════════════════════════════════════════════════════════════════════════════
# Window Management
# ══════════════════════════════════════════════════════════════════════════════

bind = SUPER, escape, killactive,
bind = SUPER, BACKSPACE, exec, pkill -x wlogout || ~/.local/bin/logoutlaunch.sh
bind = SUPER, F, fullscreen, 1
bind = SUPER SHIFT, F, fullscreen, 0
bind = SUPER, T, togglefloating,
bind = SUPER, P, pseudo,
bind = SUPER, O, layoutmsg, togglesplit

# ══════════════════════════════════════════════════════════════════════════════
# Session
# ══════════════════════════════════════════════════════════════════════════════

bind = SUPER, DELETE, exec, hyprlock
bind = SUPER SHIFT, DELETE, exit,

# ══════════════════════════════════════════════════════════════════════════════
# Move Focus (vim-style: h=left, j=down, k=up, l=right)
# ══════════════════════════════════════════════════════════════════════════════

bind = SUPER, H, movefocus, l
bind = SUPER, J, movefocus, d
bind = SUPER, K, movefocus, u
bind = SUPER, L, movefocus, r

# ══════════════════════════════════════════════════════════════════════════════
# Move Windows
# ══════════════════════════════════════════════════════════════════════════════

bind = SUPER SHIFT, H, movewindow, l
bind = SUPER SHIFT, J, movewindow, d
bind = SUPER SHIFT, K, movewindow, u
bind = SUPER SHIFT, L, movewindow, r

# ══════════════════════════════════════════════════════════════════════════════
# Workspaces
# ══════════════════════════════════════════════════════════════════════════════

bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 10

bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9
bind = SUPER SHIFT, 0, movetoworkspace, 10

# Scroll workspaces
bind = SUPER, mouse_down, exec, ~/.config/waybar/scripts/workspace-scroll.sh down
bind = SUPER, mouse_up, exec, ~/.config/waybar/scripts/workspace-scroll.sh up

# Special workspace (scratchpad)
bind = SUPER, S, togglespecialworkspace, scratchpad
bind = SUPER SHIFT, S, movetoworkspace, special:scratchpad

# ══════════════════════════════════════════════════════════════════════════════
# Layout
# ══════════════════════════════════════════════════════════════════════════════

bind = SUPER, UP, layoutmsg, cyclenext
bind = SUPER, DOWN, layoutmsg, cycleprev
bind = SUPER SHIFT, UP, layoutmsg, swapnext
bind = SUPER SHIFT, DOWN, layoutmsg, swapprev
bind = SUPER, grave, layoutmsg, orientationcycle left right bottom top

# Resize
binde = SUPER CTRL, H, resizeactive, -50 0
binde = SUPER CTRL, L, resizeactive, 50 0
binde = SUPER CTRL, K, resizeactive, 0 -50
binde = SUPER CTRL, J, resizeactive, 0 50

# ══════════════════════════════════════════════════════════════════════════════
# Groups
# ══════════════════════════════════════════════════════════════════════════════

bind = SUPER, G, togglegroup
bind = SUPER ALT, G, moveoutofgroup
bind = SUPER, U, changegroupactive, b
bind = SUPER, I, changegroupactive, f
bind = SUPER SHIFT, Y, moveintogroup, l
bind = SUPER SHIFT, U, moveintogroup, d
bind = SUPER SHIFT, I, moveintogroup, u
bind = SUPER SHIFT, O, moveintogroup, r

# ══════════════════════════════════════════════════════════════════════════════
# Snap to Screen Halves
# ══════════════════════════════════════════════════════════════════════════════

bind = SUPER ALT, H, exec, ~/.config/hypr/scripts/snap-half.sh left
bind = SUPER ALT, L, exec, ~/.config/hypr/scripts/snap-half.sh right
bind = SUPER ALT, K, exec, ~/.config/hypr/scripts/snap-half.sh top
bind = SUPER ALT, J, exec, ~/.config/hypr/scripts/snap-half.sh bottom

# ══════════════════════════════════════════════════════════════════════════════
# Mouse
# ══════════════════════════════════════════════════════════════════════════════

bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

# ══════════════════════════════════════════════════════════════════════════════
# Media & Hardware
# ══════════════════════════════════════════════════════════════════════════════

# Volume
bindel = , XF86AudioRaiseVolume, exec, ~/.local/bin/volumecontrol -o i
bindel = , XF86AudioLowerVolume, exec, ~/.local/bin/volumecontrol -o d
bindl = , XF86AudioMute, exec, ~/.local/bin/volumecontrol -o m
bindl = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# Brightness
bindel = , XF86MonBrightnessUp, exec, ~/.local/bin/brightnesscontrol i
bindel = , XF86MonBrightnessDown, exec, ~/.local/bin/brightnesscontrol d

# ══════════════════════════════════════════════════════════════════════════════
# Screenshots (direct) - saves to file and copies to clipboard
# ══════════════════════════════════════════════════════════════════════════════

bind = , Print, exec, ~/.local/bin/screenshot output
bind = ALT, Print, exec, ~/.local/bin/screenshot region
bind = CTRL, Print, exec, ~/.local/bin/screenshot window

# ══════════════════════════════════════════════════════════════════════════════
# Utilities
# ══════════════════════════════════════════════════════════════════════════════

bind = SUPER, M, exec, ~/.local/bin/music
bind = SUPER SHIFT, P, exec, hyprpicker -a
bind = SUPER SHIFT, slash, exec, pkill -x rofi || $KEYBINDS
