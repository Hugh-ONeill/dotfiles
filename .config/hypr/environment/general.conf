#####################
### LOOK AND FEEL ###
#####################

general {
  layout = dwindle
  no_focus_fallback = false
  resize_on_border = true
  extend_border_grab_area = 15
  hover_icon_on_border = true
  allow_tearing = false
  resize_corner = 0

  snap {
    enabled = true
    window_gap = 10
    monitor_gap = 10
    border_overlap = false
  }
}

dwindle {
  pseudotile = true
  preserve_split = true
}

master {
  new_status = master
}

misc {
  vrr = 1
  force_default_wallpaper = 0
  disable_hyprland_logo = true
  disable_splash_rendering = true
  animate_manual_resizes = true
  animate_mouse_windowdragging = true
  vfr = true
}

# Special workspace styling (scratchpad)
# Only workspace rules work - window rules don't apply to special workspaces
workspace = special:scratchpad, gapsout:100, gapsin:40, border:true, bordersize:4, decorate:true, rounding:12

debug {
  disable_logs = true
  disable_time = true
  enable_stdout_logs = false
}

xwayland {
  force_zero_scaling = true
}

#############
### INPUT ###
#############

input {
  kb_layout = us
  kb_options = caps:swapescape

  repeat_rate = 25
  repeat_delay = 500

  sensitivity = 0

  follow_mouse = 1

  touchpad {
    disable_while_typing = true
    natural_scroll = false
    tap-to-click = false
  }
}

cursor {
  no_hardware_cursors = true
}
