# Colors - sourced from theme
source = ~/.config/hypr/appearance/hyprlock-colors.conf

# Fonts
$font_family = Mononoki Nerd Font
$font_clock = Terminus

background {
    monitor =
    color = $crust
    path = screenshot
    blur_size = 4
    blur_passes = 3
    brightness = 0.5
}

input-field {
    monitor =
    size = 280, 55
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.3
    dots_center = true
    outer_color = $surface0
    inner_color = $base
    font_color = $text
    fade_on_empty = false
    placeholder_text = <i>Password...</i>
    hide_input = false
    check_color = $lavender
    fail_color = $red
    fail_text = <i>$FAIL</i>
    fail_transition = 300
    capslock_color = $yellow

    position = 0, -50
    halign = center
    valign = center
}

# Clock
label {
    monitor =
    text = $TIME
    shadow_passes = 2
    shadow_size = 3
    shadow_boost = 1.2
    color = $text
    font_size = 90
    font_family = $font_clock

    position = 0, 200
    halign = center
    valign = center
}

# Date
label {
    monitor =
    text = cmd[update:3600000] date +"%A, %B %d"
    shadow_passes = 1
    shadow_boost = 0.5
    color = $subtext0
    font_size = 18
    font_family = $font_family

    position = 0, 110
    halign = center
    valign = center
}

# Prompt
label {
    monitor =
    text = wouldst thou like to live deliciously?
    shadow_passes = 1
    shadow_boost = 0.5
    color = $subtext0
    font_size = 12
    font_family = $font_family

    position = 0, 50
    halign = center
    valign = bottom
}

# Lock icon
label {
    monitor =
    text =
    shadow_passes = 1
    shadow_boost = 0.5
    color = $lavender
    font_size = 24
    font_family = $font_family

    position = 0, 20
    halign = center
    valign = bottom
}
