monitor.alsa.rules = [
  {
    matches = [
      {
        device.name = "alsa_card.pci-0000_01_00.1"
      }
    ]
    actions = {
      update-props = {
        device.profile = "output:hdmi-stereo"
      }
    }
  }
  {
    matches = [
      {
        device.name = "alsa_card.pci-0000_00_1f.3"
      }
    ]
    actions = {
      update-props = {
        device.profile = "output:analog-stereo+input:analog-stereo"
      }
    }
  }
]
