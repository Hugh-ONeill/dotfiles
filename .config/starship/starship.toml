"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false

format = """
[](fg:surface0)\
[\U000f011b](fg:text bg:surface0)\
[](fg:surface0 bg:maroon)\
${custom.dir_first}\
[](fg:maroon bg:peach)\
${custom.dir_second}\
[](fg:peach bg:yellow)\
$jobs\
[](fg:yellow bg:green)\
$git_branch\
$git_status\
[](fg:green bg:sky)\
$cmd_duration\
[](fg:sky bg:sapphire)\
$c\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
[](fg:sapphire bg:blue)\
$status\
[](fg:blue bg:lavender)\
$docker_context\
[](fg:lavender bg:mauve)\
${custom.updates}\
[](fg:mauve bg:pink)\
${custom.uptime}\
[](fg:pink bg:subtext0)\
[](fg:subtext0)\
$line_break\
$character
"""

palette = 'catppuccin_mocha'

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
base = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"

[custom.dir_first]
command = "~/.local/bin/directory-split first"
when = "true"
shell = ["bash", "--noprofile", "--norc"]
style = "bg:maroon"
format = "[[$output ](fg:mantle bg:maroon)]($style)"

[custom.dir_second]
command = "~/.local/bin/directory-split second"
when = "true"
shell = ["bash", "--noprofile", "--norc"]
style = "bg:peach"
format = "[[$output ](fg:base bg:peach)]($style)"

[jobs]
symbol = "\uf0ae"
style = "bg:yellow"
format = '[[ $symbol $number ](fg:mantle bg:yellow)]($style)'

[git_branch]
symbol = ""
style = "bg:green"
format = '[[ $symbol $branch ](fg:base bg:green)]($style)'

[git_status]
style = "bg:green"
format = '[[($all_status$ahead_behind )](fg:base bg:green)]($style)'

[cmd_duration]
min_time = 500
style = "bg:sky"
format = '[[ 󱎫 $duration ](fg:mantle bg:sky)]($style)'

[docker_context]
symbol = ""
style = "bg:lavender"
format = '[[ $symbol( $context) ](fg:base bg:lavender)]($style)'

[status]
disabled = false
symbol = "✘"
success_symbol = ""
style = "bg:blue"
format = '[[ $symbol $status ](fg:mantle bg:blue)]($style)'

[nodejs]
symbol = ""
style = "bg:lavender"
format = '[[ $symbol( $version) ](fg:base bg:lavender)]($style)'

[c]
symbol = " "
style = "bg:lavender"
format = '[[ $symbol( $version) ](fg:base bg:lavender)]($style)'

[rust]
symbol = ""
style = "bg:lavender"
format = '[[ $symbol( $version) ](fg:base bg:lavender)]($style)'

[golang]
symbol = ""
style = "bg:lavender"
format = '[[ $symbol( $version) ](fg:base bg:lavender)]($style)'

[php]
symbol = ""
style = "bg:lavender"
format = '[[ $symbol( $version) ](fg:base bg:lavender)]($style)'

[java]
symbol = " "
style = "bg:lavender"
format = '[[ $symbol( $version) ](fg:base bg:lavender)]($style)'

[kotlin]
symbol = ""
style = "bg:lavender"
format = '[[ $symbol( $version) ](fg:base bg:lavender)]($style)'

[haskell]
symbol = ""
style = "bg:lavender"
format = '[[ $symbol( $version) ](fg:base bg:lavender)]($style)'

[python]
symbol = ""
style = "bg:lavender"
format = '[[ $symbol( $version) ](fg:base bg:lavender)]($style)'

[custom.updates]
command = "~/.local/bin/checkupdates-cached"
when = "test -f ~/.cache/checkupdates-count && test $(cat ~/.cache/checkupdates-count) -gt 0"
shell = ["bash", "--noprofile", "--norc"]
style = "bg:mauve"
format = '[[ 󰏔 $output ](fg:base bg:mauve)]($style)'

[custom.uptime]
command = "uptime -p | sed -E 's/^up //; s/ hours?/h/g; s/ minutes?/m/g; s/,//g; s/ //g'"
when = "true"
symbol = "" 
style = "bg:pink"
format = '[[ $symbol $output ](fg:mantle bg:pink)]($style)'

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[](bold fg:green)'
error_symbol = '[](bold fg:red)'
vimcmd_symbol = '[](bold fg:green)'
vimcmd_replace_one_symbol = '[](bold fg:mauve)'
vimcmd_replace_symbol = '[](bold fg:mauve)'
vimcmd_visual_symbol = '[](bold fg:lavender)'
