"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false

format = """
[](fg:surface0)\
[\U000f011b](fg:text bg:surface0)\
[](fg:surface0 bg:g0)\
${custom.dir_first}\
[](fg:g0 bg:g1)\
${custom.dir_second}\
[](fg:g1 bg:g2)\
$jobs\
[](fg:g2 bg:g3)\
$git_branch\
$git_status\
[](fg:g3 bg:g4)\
$cmd_duration\
[](fg:g4 bg:g5)\
$c\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
[](fg:g5 bg:g6)\
$status\
[](fg:g6 bg:g7)\
$docker_context\
[](fg:g7 bg:g8)\
${custom.updates}\
[](fg:g8 bg:g9)\
${custom.uptime}\
[](fg:g9 bg:text)\
[](fg:text)\
$line_break\
$character

"""

